services:
    nginx:
        image: nginx:latest
        container_name: nginx
        volumes:
            - ./nginx.default.conf:/etc/nginx/conf.d/default.conf
            - ./cert/certbot/conf:/etc/letsencrypt
            - ./cert/certbot/www:/var/www/certbot
        restart: always
        ports:
            - '80:80'
            - '443:443'

    certbot:
        image: certbot/certbot
        volumes:
            - ./cert/certbot/conf:/etc/letsencrypt
            - ./cert/certbot/www:/var/www/certbot
        command: certonly --webroot -w /var/www/certbot
            --email cnimuy2@icloud.com
            -d cnimuy.site
            --agree-tos
